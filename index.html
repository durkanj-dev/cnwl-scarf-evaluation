<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCARF Programme Staff Evaluation Survey — CNWL 2026</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;font-size:16px;line-height:1.7;color:#0d0d0d;background:#f2f2ef;padding:1.5rem 1rem 3rem}
.container{max-width:720px;margin:0 auto}
.survey-header{background:#fff;border-radius:12px;padding:1.75rem 2rem;margin-bottom:1.25rem;border:1px solid #d8d8d4}
.trust-label{font-size:12px;font-weight:600;color:#005EB8;text-transform:uppercase}
.progress-wrap{background:#fff;border-radius:8px;padding:.65rem 1.25rem;margin-bottom:1.25rem;border:1px solid #d8d8d4;display:flex;align-items:center;gap:12px}
.progress-bar-outer{flex:1;height:8px;background:#d8d8d4;border-radius:4px;overflow:hidden}
.progress-bar-inner{height:100%;background:#005EB8;transition:width .35s ease}
.section-card{background:#fff;border-radius:12px;border:1px solid #d8d8d4;margin-bottom:1.25rem;overflow:hidden;display:none}
.section-card.active{display:block}
.section-header{background:#005EB8;padding:1rem 1.5rem;color:#fff}
.questions-wrap{padding:1.5rem}
.question{margin-bottom:1.75rem;padding-bottom:1.75rem;border-bottom:1px solid #eeeeea}
.rb, .yb{display:flex;align-items:center;justify-content:center;min-height:48px;padding:8px;border:1.5px solid #bbb;border-radius:8px;cursor:pointer}
input[type=radio]{position:absolute;opacity:0}
input[type=radio]:checked+.rb, input[type=radio]:checked+.yb{background:#005EB8;color:#fff;border-color:#005EB8}
.form-textarea, .form-select{width:100%;padding:10px;border:1.5px solid #bbb;border-radius:8px}
.nav-row{display:flex;justify-content:space-between;margin-top:20px}
.btn{padding:12px 24px;border-radius:8px;cursor:pointer;font-weight:600;border:1.5px solid #bbb}
.btn-primary{background:#005EB8;color:#fff;border-color:#005EB8}
.btn-submit{background:#00693e;color:#fff;border-color:#00693e}
.submitting-overlay{display:none;position:fixed;inset:0;background:rgba(255,255,255,0.9);z-index:999;align-items:center;justify-content:center;flex-direction:column}
.submitting-overlay.visible{display:flex}
</style>
</head>
<body>

<div id="submitting-overlay" class="submitting-overlay">
    <div style="border:4px solid #f3f3f3;border-top:4px solid #005EB8;border-radius:50%;width:40px;height:40px;animation:spin 1s linear infinite"></div>
    <p>Submitting to Google Sheets...</p>
</div>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>

<div class="container">
    <header class="survey-header">
        <p class="trust-label">CNWL NHS Foundation Trust</p>
        <h1>SCARF Programme — Staff Impact Survey</h1>
        <p>This survey is anonymous and helps evaluate the effectiveness of the SCARF framework.</p>
    </header>

    <div class="progress-wrap">
        <div class="progress-bar-outer"><div class="progress-bar-inner" id="progress-bar" style="width:20%"></div></div>
        <span id="progress-label">Section 1 of 5</span>
    </div>

    <main id="main-content">
        <form id="scarf-form">
            <section class="section-card active" id="section-0">
                <div class="section-header"><h2>Section 1: Awareness</h2></div>
                <div class="questions-wrap">
                    <div class="question">
                        <label><strong>Q1. How familiar were you with SCARF?</strong></label>
                        <div style="display:flex; gap:5px; margin-top:10px;">
                            <label style="flex:1;"><input type="radio" name="q1" value="1"><span class="rb">1 (Low)</span></label>
                            <label style="flex:1;"><input type="radio" name="q1" value="2"><span class="rb">2</span></label>
                            <label style="flex:1;"><input type="radio" name="q1" value="3"><span class="rb">3</span></label>
                            <label style="flex:1;"><input type="radio" name="q1" value="4"><span class="rb">4</span></label>
                            <label style="flex:1;"><input type="radio" name="q1" value="5"><span class="rb">5 (High)</span></label>
                        </div>
                    </div>
                    <div class="question">
                        <label><strong>Q2. What does SCARF stand for?</strong></label>
                        <textarea class="form-textarea" name="q2" rows="4"></textarea>
                    </div>
                </div>
            </section>

            <section class="section-card" id="section-1">
                <div class="section-header"><h2>Section 2: Impact</h2></div>
                <div class="questions-wrap">
                    <div class="question">
                        <label><strong>Q15. Any final comments?</strong></label>
                        <textarea class="form-textarea" name="q15" rows="4"></textarea>
                    </div>
                </div>
            </section>

            <nav class="nav-row">
                <button type="button" class="btn" id="btn-prev" style="display:none">Previous</button>
                <button type="button" class="btn btn-primary" id="btn-next">Next</button>
                <button type="button" class="btn btn-submit" id="btn-submit" style="display:none">Submit Response</button>
            </nav>
        </form>
    </main>
</div>

<script>
    // YOUR GOOGLE LINK
    const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyejBBaeguv7Pvtea-vLDoM-HGLEMH0pRFEAeYanBYZfhQ6VAk4qkwjVuXP8uBAKTVzxg/exec";
    
    let currentSection = 0;
    const sections = document.querySelectorAll('.section-card');
    const btnNext = document.getElementById('btn-next');
    const btnPrev = document.getElementById('btn-prev');
    const btnSubmit = document.getElementById('btn-submit');
    const progressBar = document.getElementById('progress-bar');
    const progressLabel = document.getElementById('progress-label');

    function updateUI() {
        sections.forEach((s, i) => s.classList.toggle('active', i === currentSection));
        btnPrev.style.display = currentSection === 0 ? 'none' : 'block';
        btnNext.style.display = currentSection === sections.length - 1 ? 'none' : 'block';
        btnSubmit.style.display = currentSection === sections.length - 1 ? 'block' : 'none';
        
        const progress = ((currentSection + 1) / sections.length) * 100;
        progressBar.style.width = progress + '%';
        progressLabel.innerText = `Section ${currentSection + 1} of ${sections.length}`;
        window.scrollTo(0,0);
    }

    btnNext.onclick = () => { currentSection++; updateUI(); };
    btnPrev.onclick = () => { currentSection--; updateUI(); };

    btnSubmit.onclick = async () => {
        document.getElementById('submitting-overlay').classList.add('visible');
        const formData = {};
        // Collects everything from the form
        const inputs = document.querySelectorAll('input:checked, textarea, select');
        inputs.forEach(i => formData[i.name] = i.value);

        try {
            await fetch(GOOGLE_SCRIPT_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify(formData)
            });
            document.getElementById('main-content').innerHTML = "<div style='text-align:center; padding:3rem;'><h2>✓ Thank You</h2><p>Your response was saved to Google Sheets.</p></div>";
        } catch (e) {
            alert("Error sending data. Please check your connection.");
        } finally {
            document.getElementById('submitting-overlay').classList.remove('visible');
        }
    };

    updateUI();
</script>
</body>
</html>
