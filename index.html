<script>
  // Your specific Google Web App URL
  const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyejBBaeguv7Pvtea-vLDoM-HGLEMH0pRFEAeYanBYZfhQ6VAk4qkwjVuXP8uBAKTVzxg/exec";

  async function submitSurvey(e) {
    if (e) e.preventDefault();

    // 1. Show the loading overlay
    const overlay = document.getElementById('submitting-overlay');
    if (overlay) overlay.classList.add('visible');

    // 2. Gather all form data
    const formData = {};
    
    // Capture standard inputs (Radios, Selects, Textareas)
    const allInputs = document.querySelectorAll('input[type="radio"]:checked, select, textarea');
    allInputs.forEach(input => {
      formData[input.name] = input.value;
    });

    // Capture Checkboxes (specifically for Q3 - Sources)
    const checkboxes = document.querySelectorAll('input[name="q3"]:checked');
    if (checkboxes.length > 0) {
      formData.q3 = Array.from(checkboxes).map(cb => cb.value).join(", ");
    }

    // 3. Send the data to your Google Sheet
    try {
      await fetch(GOOGLE_SCRIPT_URL, {
        method: "POST",
        mode: "no-cors", // Required for Google Apps Script cross-domain
        cache: "no-cache",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(formData)
      });

      // 4. Handle Success UI
      // Hide the survey and show a thank you message
      const mainContent = document.getElementById('main-content');
      const progressWrap = document.querySelector('.progress-wrap');
      
      if (mainContent) mainContent.innerHTML = `
        <div style="background:#fff; padding:3rem 2rem; text-align:center; border-radius:12px; border:1px solid #d8d8d4;">
          <div style="width:60px; height:60px; background:#d4edda; border-radius:50%; display:flex; align-items:center; justify-content:center; margin:0 auto 1.25rem; font-size:28px; color:#00693e;">✓</div>
          <h2>Submission Successful</h2>
          <p>Thank you for participating. Your anonymous responses have been recorded to the CNWL SCARF Evaluation database.</p>
          <button onclick="location.reload()" class="btn btn-secondary" style="margin-top:1.5rem">Submit another response</button>
        </div>
      `;
      if (progressWrap) progressWrap.style.display = 'none';
      window.scrollTo(0, 0);

    } catch (error) {
      console.error("Submission Error:", error);
      alert("Submission failed. Please check your internet connection and try again.");
    } finally {
      if (overlay) overlay.classList.remove('visible');
    }
  }

  // Attach the function to your Submit button
  document.addEventListener('click', function(event) {
    // Check if the clicked element is your submit button
    if (event.target && (event.target.id === 'btn-submit' || event.target.classList.contains('btn-submit'))) {
      submitSurvey(event);
    }
  });
</script>
