<style>
  /* Base Reset and Typography */
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { 
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
    font-size: 16px; 
    line-height: 1.6; 
    color: #0d0d0d; 
    background: #f2f2ef; 
    padding: 1.5rem 1rem 3rem; 
  }

  .container { max-width: 720px; margin: 0 auto; }

  /* Section and Card Styling */
  .survey-header, .section-card {
    background: #fff;
    border-radius: 12px;
    padding: 1.75rem 2rem;
    margin-bottom: 1.25rem;
    border: 1px solid #d8d8d4;
    width: 100%; /* Ensures cards don't shrink on laptop */
  }

  /* CRITICAL FIX: Radio Button Alignment */
  .radio-group {
    display: flex;
    flex-direction: column; /* Forces vertical stack on all devices */
    gap: 10px;
    width: 100%;
    margin-top: 1rem;
  }

  .radio-group label {
    display: flex;
    align-items: flex-start; /* Aligns dot with the top of long text */
    padding: 14px 16px;
    background: #f9f9f7;
    border: 1px solid #d8d8d4;
    border-radius: 8px;
    cursor: pointer;
    transition: background 0.2s, border-color 0.2s;
    width: 100%;
    position: relative;
  }

  .radio-group label:hover {
    background: #f0f0ed;
    border-color: #005EB8;
  }

  /* Prevents the radio circle from squashing or moving right */
  .radio-group input[type="radio"] {
    margin-right: 14px;
    margin-top: 4px;
    flex-shrink: 0; /* Magic fix for horizontal 'drift' */
    width: 20px;
    height: 20px;
    cursor: pointer;
  }

  /* Matrix Table Fix for Laptop/Mobile */
  .matrix-wrapper {
    width: 100%;
    overflow-x: auto;
    margin: 1rem 0;
    border-radius: 8px;
    border: 1px solid #d8d8d4;
  }

  .matrix-table {
    width: 100%;
    border-collapse: collapse;
    min-width: 500px; /* Prevents text clumping in the grid */
  }

  .matrix-table th, .matrix-table td {
    padding: 12px;
    border-bottom: 1px solid #eee;
    text-align: center;
  }

  .matrix-table th:first-child, .matrix-table td:first-child {
    text-align: left;
    width: 40%;
    background: #fdfdfb;
  }

  /* Responsive Adjustments */
  @media (max-width: 600px) {
    .survey-header, .section-card { padding: 1.25rem 1.5rem; }
    .nav-btns { flex-direction: column; }
    .nav-btns button { width: 100%; }
  }

  /* Visual Polish */
  .btn-primary {
    background: #005EB8; /* NHS Blue */
    color: white;
    padding: 12px 24px;
    border: none;
    border-radius: 6px;
    font-weight: 600;
    cursor: pointer;
  }
</style>
