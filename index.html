<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SCARF Programme Survey — CNWL 2026</title>
    <style>
        /* THE LOOK */
        body { font-family: Arial, sans-serif; background: #f2f2ef; color: #333; padding: 20px; line-height: 1.6; }
        .container { max-width: 600px; margin: 0 auto; background: #fff; padding: 30px; border-radius: 12px; border: 1px solid #d8d8d4; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        h1 { color: #005EB8; font-size: 22px; margin-bottom: 10px; }
        .section { display: none; }
        .section.active { display: block; }
        .btn { padding: 12px 24px; border-radius: 6px; cursor: pointer; border: 1px solid #bbb; font-weight: bold; }
        .btn-next { background: #005EB8; color: white; border: none; }
        .btn-submit { background: #00693e; color: white; border: none; }
        textarea { width: 100%; padding: 10px; margin-top: 10px; border-radius: 6px; border: 1px solid #ccc; }
        .progress { font-size: 12px; color: #666; margin-bottom: 20px; }
        .overlay { display: none; position: fixed; inset: 0; background: rgba(255,255,255,0.8); z-index: 100; align-items: center; justify-content: center; font-weight: bold; }
        .overlay.visible { display: flex; }
    </style>
</head>
<body>

<div id="loader" class="overlay">Submitting to Google Sheets...</div>

<div class="container">
    <header>
        <p style="color:#005EB8; font-weight:bold; font-size:12px;">CNWL NHS Foundation Trust</p>
        <h1>SCARF Evaluation Survey</h1>
        <p class="progress" id="p-text">Step 1 of 3</p>
    </header>

    <form id="scarfForm">
        <div class="section active" id="s0">
            <p><strong>Q1. How familiar are you with the SCARF framework?</strong></p>
            <input type="radio" name="q1" value="1"> 1 (Low)<br>
            <input type="radio" name="q1" value="2"> 2<br>
            <input type="radio" name="q1" value="3"> 3<br>
            <input type="radio" name="q1" value="4"> 4<br>
            <input type="radio" name="q1" value="5"> 5 (High)
        </div>

        <div class="section" id="s1">
            <p><strong>Q2. What does SCARF stand for?</strong></p>
            <textarea name="q2" rows="4" placeholder="S=, C=, A=..."></textarea>
        </div>

        <div class="section" id="s2">
            <p><strong>Q15. Any final feedback for the programme?</strong></p>
            <textarea name="q15" rows="4"></textarea>
        </div>

        <div style="margin-top: 30px; display: flex; justify-content: space-between;">
            <button type="button" class="btn" id="prevBtn" style="display:none;">Previous</button>
            <button type="button" class="btn btn-next" id="nextBtn">Next</button>
            <button type="button" class="btn btn-submit" id="submitBtn" style="display:none;">Submit Response</button>
        </div>
    </form>
</div>

<script>
    const GOOGLE_URL = "https://script.google.com/macros/s/AKfycbyejBBaeguv7Pvtea-vLDoM-HGLEMH0pRFEAeYanBYZfhQ6VAk4qkwjVuXP8uBAKTVzxg/exec";
    let step = 0;
    const steps = document.querySelectorAll('.section');
    
    function showStep(n) {
        steps.forEach((s, i) => s.classList.toggle('active', i === n));
        document.getElementById('prevBtn').style.display = n === 0 ? 'none' : 'block';
        document.getElementById('nextBtn').style.display = n === steps.length - 1 ? 'none' : 'block';
        document.getElementById('submitBtn').style.display = n === steps.length - 1 ? 'block' : 'none';
        document.getElementById('p-text').innerText = `Step ${n + 1} of ${steps.length}`;
    }

    document.getElementById('nextBtn').onclick = () => { step++; showStep(step); };
    document.getElementById('prevBtn').onclick = () => { step--; showStep(step); };

    document.getElementById('submitBtn').onclick = async () => {
        document.getElementById('loader').classList.add('visible');
        const data = {};
        const inputs = document.querySelectorAll('input:checked, textarea');
        inputs.forEach(i => data[i.name] = i.value);

        try {
            await fetch(GOOGLE_URL, {
                method: "POST",
                mode: "no-cors",
                body: JSON.stringify(data)
            });
            document.querySelector('.container').innerHTML = "<h1>Success!</h1><p>Your response has been recorded. You can close this window.</p>";
        } catch (e) {
            alert("Error submitting. Please try again.");
        } finally {
            document.getElementById('loader').classList.remove('visible');
        }
    };
</script>

</body>
</html>
